<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Metamorfosis Kupu-Kupu AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* Tampilan UI Keterangan */
      #ui-container {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        width: 80%;
        text-align: center;
      }
      #caption-box {
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        font-family: Arial, sans-serif;
        border: 2px solid #3498db;
      }
      h3 { margin: 0 0 5px 0; color: #3498db; }
      p { margin: 0; font-size: 14px; line-height: 1.4; }
      button {
        padding: 12px 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 50px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
      button:active { transform: scale(0.95); }
    </style>
  </head>

  <body>
    <div id="ui-container">
      <div id="caption-box">
        <h3 id="title">Fase 1: Telur</h3>
        <p id="desc">Induk kupu-kupu meletakkan telurnya di atas daun agar larva yang menetas bisa langsung mendapatkan makanan.</p>
      </div>
      <button onclick="nextPhase()">LIHAT FASE BERIKUTNYA</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="m1" src="telur.glb"></a-asset-item>
        <a-asset-item id="m2" src="caterpillar.glb"></a-asset-item>
        <a-asset-item id="m3" src="pupa.glb"></a-asset-item>
        <a-asset-item id="m4" src="butterfly.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model id="fase1" src="#m1" position="0 0 0" scale="0.5 0.5 0.5" visible="true"></a-gltf-model>
        <a-gltf-model id="fase2" src="#m2" position="0 0 0" scale="0.5 0.5 0.5" visible="false"></a-gltf-model>
        <a-gltf-model id="fase3" src="#m3" position="0 0 0" scale="0.5 0.5 0.5" visible="false"></a-gltf-model>
        <a-gltf-model id="fase4" src="#m4" position="0 0 0" scale="0.5 0.5 0.5" visible="false"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      let current = 1;
      const dataMetamorfosis = [
        {
          title: "Fase 1: Telur",
          desc: "Induk kupu-kupu meletakkan telurnya di atas daun agar larva yang menetas bisa langsung mendapatkan makanan."
        },
        {
          title: "Fase 2: Ulat (Larva)",
          desc: "Tugas utama ulat adalah makan sebanyak-banyaknya untuk menyimpan energi guna pertumbuhan selanjutnya."
        },
        {
          title: "Fase 3: Kepompong (Pupa)",
          desc: "Di dalam kantung ini, tubuh ulat berubah secara luar biasa menjadi struktur tubuh kupu-kupu yang sempurna."
        },
        {
          title: "Fase 4: Kupu-Kupu (Imago)",
          desc: "Kupu-kupu keluar dari kepompong, mengeringkan sayapnya, dan siap terbang untuk mencari nektar."
        }
      ];
      
      function nextPhase() {
        // Sembunyikan model lama
        document.querySelector(`#fase${current}`).setAttribute('visible', 'false');
        
        // Update index (1-4)
        current = current < 4 ? current + 1 : 1;
        
        // Tampilkan model baru
        document.querySelector(`#fase${current}`).setAttribute('visible', 'true');
        
        // Update Teks Keterangan
        document.getElementById('title').innerText = dataMetamorfosis[current-1].title;
        document.getElementById('desc').innerText = dataMetamorfosis[current-1].desc;
      }
    </script>
  </body>
</html>
